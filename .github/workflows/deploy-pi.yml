name: Deploy Tagged Release To Pi

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image:
        description: "Full image reference to deploy"
        required: false
        type: string
      compose_file:
        description: "Compose file path on the Pi"
        required: false
        default: docker-compose.production.yml
        type: string
      env_file:
        description: "Environment file path on the Pi"
        required: false
        default: .env
        type: string

jobs:
  deploy:
    name: Deploy On Raspberry Pi
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      DEPLOY_IMAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.image != '' && inputs.image || format('ghcr.io/{0}/taxhacker:{1}', github.repository_owner, github.ref_name) }}
      PI_DEPLOY_DIR: /root/projects/taxhacker
      PI_COMPOSE_FILE: docker-compose.production.yml
      PI_ENV_FILE: .env

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for image to become available
        shell: bash
        run: |
          set -euo pipefail

          IMAGE="${DEPLOY_IMAGE}"
          echo "Waiting for image: ${IMAGE}"

          for attempt in {1..30}; do
            if docker manifest inspect "${IMAGE}" > /dev/null 2>&1; then
              echo "Image is available."
              exit 0
            fi

            echo "Image not available yet (attempt ${attempt}/30)."
            sleep 10
          done

          echo "Timed out waiting for image ${IMAGE}" >&2
          exit 1

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          tags: tag:ci

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PI_SSH_KEY }}

      - name: Add Raspberry Pi to known hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.PI_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync deploy files to Raspberry Pi
        shell: bash
        env:
          PI_HOST: ${{ secrets.PI_HOST }}
          PI_USER: ${{ secrets.PI_USER }}
        run: |
          set -euo pipefail

          ssh "${PI_USER}@${PI_HOST}" "mkdir -p '${PI_DEPLOY_DIR}/scripts'"
          scp docker-compose.production.yml "${PI_USER}@${PI_HOST}:${PI_DEPLOY_DIR}/docker-compose.production.yml"
          scp scripts/deploy-with-rollback.sh "${PI_USER}@${PI_HOST}:${PI_DEPLOY_DIR}/scripts/deploy-with-rollback.sh"
          ssh "${PI_USER}@${PI_HOST}" "chmod +x '${PI_DEPLOY_DIR}/scripts/deploy-with-rollback.sh'"

      - name: Deploy on Raspberry Pi
        shell: bash
        env:
          PI_HOST: ${{ secrets.PI_HOST }}
          PI_USER: ${{ secrets.PI_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail

          ssh "${PI_USER}@${PI_HOST}" \
            DEPLOY_IMAGE="${DEPLOY_IMAGE}" \
            PI_DEPLOY_DIR="${PI_DEPLOY_DIR}" \
            PI_COMPOSE_FILE="${PI_COMPOSE_FILE}" \
            PI_ENV_FILE="${PI_ENV_FILE}" \
            GHCR_USERNAME="${GHCR_USERNAME}" \
            GHCR_TOKEN="${GHCR_TOKEN}" \
            'sh -se' <<'EOF'
          set -euo pipefail

          cd "${PI_DEPLOY_DIR}"

          if [ -n "${GHCR_USERNAME}" ] && [ -n "${GHCR_TOKEN}" ]; then
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
          fi

          COMPOSE_FILE="${PI_COMPOSE_FILE}" \
          ENV_FILE="${PI_ENV_FILE}" \
          ./scripts/deploy-with-rollback.sh "${DEPLOY_IMAGE}"
          EOF