services:
  app:
    image: ${TAXHACKER_IMAGE:-ghcr.io/yagnil/taxhacker:latest}
    container_name: taxhacker_app
    networks:
      - taxhacker_network
    environment:
      - NODE_ENV=production
      - BASE_URL=${BASE_URL:-http://localhost:7331}
      - SELF_HOSTED_MODE=${SELF_HOSTED_MODE:-true}
      - UPLOAD_PATH=/app/data/uploads
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/taxhacker}
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${APP_BIND_ADDRESS:-0.0.0.0}:7331:7331"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:7331', { redirect: 'manual' }).then((response) => process.exit(response.status < 500 ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "100M"
        max-file: "3"

  postgres:
    image: postgres:17-alpine
    container_name: taxhacker-postgres
    networks:
      - taxhacker_network
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-taxhacker}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-taxhacker}",
        ]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "100M"
        max-file: "3"

networks:
  taxhacker_network:
    driver: bridge
